<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 200px;
      padding: 12px;
      font-family: sans-serif;
      font-size: 13px;
    }
    button {
      display: block;
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
      font-size: 13px;
    }
    button:hover { background: #e0e0e0; }
    #status {
      margin-top: 4px;
      color: #555;
      min-height: 18px;
    }
    .ok  { color: #2a7a2a; }
    .err { color: #c00; }
  </style>
</head>
<body>
  <button id="btn-shutuba">出馬表を取得</button>
  <button id="btn-newspaper">競馬新聞を取得</button>
  <button id="btn-result">レース結果を取得</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
